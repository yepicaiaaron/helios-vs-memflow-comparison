services:
  - type: web
    name: helios-vs-memflow-comparison
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --worker-class aiohttp.GunicornWebWorker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.2
      - key: GEMINI_API_KEY
        sync: false
